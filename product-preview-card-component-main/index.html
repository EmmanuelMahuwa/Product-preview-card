<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" type="text/css" href="styles.css">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<div class="home-container"> <!--div1-->
 
    <div class="image-container">
      <picture class = "product-image">
        <source
          class = "product-image"
          media = "(min-width: 48em)"
          srcset = "images/image-product-desktop.jpg"
        >
        <img class = "product-image" srcset = "images/image-product-mobile.jpg" alt = "images/image-product-desktop">
      </picture>
    </div>
    
    <div class = "product-info"> <!--div3-->
      <p class="product">Perfume</p>
    

      <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>

      <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>
      <div class="price"> <!-- Div4 -->
        <h1 class="selling-price">$149.99</h1>


        <p class="actual-price">$169.99</p>
      </div> <!-- div4 close -->


      <button class="cart-button">
        <img class="cart-icon" src="images/icon-cart.svg" alt="cart-icon">
        <strong>Add to Cart</strong>
      </button>
    </div> <!--div3 close-->
  


</div> <!--div1 close-->


</body>
</html>
